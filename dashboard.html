<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Student Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body class="p-4">
        <div class="container">
            <h1 class="text-center mb-4">Student Dashboard</h1>
            <div class="alert alert-success">
                You have 3 new message.
            </div>
            <div class="alert alert-warning">
                ⚠ Your profile is 90% complete.
            </div>
            <div class="card" style="width: 1300px;">
                <div class="card-header bg-success text-dark d-flex justify-content-between">
                    Dashboard summary
                    <button class="btn btn-sm btn-primary">
                        Notifications <span class="badge bg-warning text-dark">6</span>
                    </button>
                </div>
                <div class="card-body">
                    <h5>Hello, Madhumidha!</h5>
                    <p>Here is a summary of your Student profile.</p>
                    <ul class="list-group mb-4">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Profile Updates<span class="badge bg-success rounded-pill">Complete</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Assignments Pending<span class="badge bg-warning rounded-pill">2</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            Messages<span class="badge bg-primary rounded-pill">3</span>
                        </li>
                    </ul>
                    <h5>Profile Completion</h5>
                    <div class="progress mb-4">
                        <div class="progress-bar progress-bar-striped" style="width: 70%;">70%</div>
                    </div>
                    <button class="btn btn-outline-primary">Update Profile</button>
                    <button class="btn btn-outline-success">View Assignment</button>
                </div>
                <div class="card-footer text-muted  bg-light">
                    Last updated:6 mins ago
                </div>
            </div>
        </div>
    </body>
</html>
